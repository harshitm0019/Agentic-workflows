name: Notify Agentic Workflows Platform

on:
  pull_request:
    types: [opened, synchronize]
  workflow_run:
    workflows: ["*"]
    types: [completed]

jobs:
  notify-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Send PR webhook to platform
        env:
          PLATFORM_WEBHOOK_URL: ${{ secrets.PLATFORM_WEBHOOK_URL }}
          PLATFORM_WEBHOOK_SECRET: ${{ secrets.PLATFORM_WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(cat "$GITHUB_EVENT_PATH")
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$PLATFORM_WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          DELIVERY_ID=$(uuidgen || cat /proc/sys/kernel/random/uuid)

          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$PLATFORM_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-GitHub-Delivery: $DELIVERY_ID" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"

  notify-failure:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Send failure webhook to platform
        env:
          PLATFORM_WEBHOOK_URL: ${{ secrets.PLATFORM_WEBHOOK_URL }}
          PLATFORM_WEBHOOK_SECRET: ${{ secrets.PLATFORM_WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(cat "$GITHUB_EVENT_PATH")
          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$PLATFORM_WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          DELIVERY_ID=$(uuidgen || cat /proc/sys/kernel/random/uuid)

          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$PLATFORM_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: workflow_run" \
            -H "X-GitHub-Delivery: $DELIVERY_ID" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"

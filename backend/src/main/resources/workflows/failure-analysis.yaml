name: failure-analysis
trigger: workflow_run_failure
description: Analyzes pipeline failure and suggests fixes

steps:
  - name: analyze-logs
    agent: log-analysis
    input:
      logs: "{{trigger.logs}}"
    onError: halt

  - name: suggest-fix
    agent: change-suggestion
    input:
      report: "{{steps.analyze-logs.output}}"
      repo: "{{trigger.repo}}"
      branch: "{{trigger.branch}}"
    onError: halt
    requiresReview: true

server:
  port: 8080

spring:
  application:
    name: agentic-workflows
  config:
    import: classpath:agents.yaml

  datasource:
    url: ${env.SPRING_DATASOURCE_URL:jdbc:h2:mem:agentic;DB_CLOSE_DELAY=-1;MODE=PostgreSQL}
    username: ${env.SPRING_DATASOURCE_USERNAME:sa}
    password: ${env.SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: ${SPRING_JPA_DIALECT:org.hibernate.dialect.H2Dialect}

  flyway:
    enabled: ${FLYWAY_ENABLED:false}

  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Application-specific config
github:
  token: ${env.GITHUB_TOKEN:}
  base-url: ${GITHUB_BASE_URL:https://api.github.com}
  webhook-secret: ${env.GITHUB_WEBHOOK_SECRET:}

gemini:
  api-key: ${env.GEMINI_API_KEY:}
  daily-limit: ${env.GEMINI_DAILY_LIMIT:1500}
